<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a0e00"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#6b4f10" stroke-width="2.5"/>
  <!-- Sword blade -->
  <line x1="32" y1="8" x2="32" y2="46" stroke="#ffcc00" stroke-width="4" stroke-linecap="round"/>
  <!-- Sword tip -->
  <polygon points="32,6 29,14 35,14" fill="#ffcc00"/>
  <!-- Cross guard -->
  <line x1="20" y1="38" x2="44" y2="38" stroke="#ffaa30" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="32" y1="46" x2="32" y2="57" stroke="#a06020" stroke-width="5" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="32" cy="57" r="4" fill="#ffcc00"/>
  <!-- Glow dot on blade -->
  <circle cx="32" cy="18" r="2.5" fill="#fff8c0" opacity="0.7"/>
</svg>
